name: CI

on:
  push:
    branches: []
  pull_request:

env:
  PROJECT: 'lesson14'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PROJECT }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.PROJECT }}
      - run: npm run lint
        working-directory: ${{ env.PROJECT }}
      - run: npm run test
        working-directory: ${{ env.PROJECT }}
